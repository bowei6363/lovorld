services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: lovorld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lovorld
      POSTGRES_PASSWORD: lovorld_dev
      POSTGRES_DB: lovorld
    ports:
      - "5432:5432"
    volumes:
      - lovorld_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovorld -d lovorld"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lovorld_pgdata:
